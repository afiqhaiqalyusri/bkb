# ─────────────────────────────────────────────────────────────────
#  BKB — Nginx VPS Reference Config
#  Domain: fyp.afiqhaiqal.my
#  SSL:    Let's Encrypt via Certbot
#
#  NOTE: This file is a REFERENCE ONLY.
#  The actual live config on the VPS is written by:
#    sudo bash scripts/ssl-setup.sh fyp.afiqhaiqal.my
#  which writes directly to /etc/nginx/sites-available/bkb
#
#  To manually install this config:
#    sudo cp nginx.vps.conf /etc/nginx/sites-available/bkb
#    sudo ln -sf /etc/nginx/sites-available/bkb /etc/nginx/sites-enabled/bkb
#    sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────

# ── HTTP → HTTPS Redirect ────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name fyp.afiqhaiqal.my;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Main Server ────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fyp.afiqhaiqal.my;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/fyp.afiqhaiqal.my/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fyp.afiqhaiqal.my/privkey.pem;

    # TLS hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://fyp.afiqhaiqal.my; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    server_tokens off;
    client_max_body_size 10M;

    # ── Frontend (React SPA — Docker port 5173) ──────────────
    location / {
        proxy_pass         http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }

    # ── Backend API (Spring Boot — Docker port 8081) ─────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ── Rate-limited login ────────────────────────────────────
    location /api/auth/login {
        limit_req zone=login_limit burst=2 nodelay;
        limit_req_status 429;
        proxy_pass         http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Block Swagger in production ───────────────────────────
    location ~ ^/api/(swagger-ui|v3/api-docs|webjars) {
        return 403;
    }

    # ── Block actuator (allow only /health) ──────────────────
    location /api/actuator/ {
        return 403;
    }
    location = /api/actuator/health {
        proxy_pass http://127.0.0.1:8081/actuator/health;
        proxy_set_header Host $host;
    }
}
