name: BKB — Build, Push & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Prevent concurrent deployments
concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE:  ghcr.io/${{ github.repository_owner }}/bkb-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/bkb-frontend

jobs:
  # ─── Job 1: Build & Test ──────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build & test backend
        working-directory: backend
        run: mvn clean package -B
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: https://fyp.afiqhaiqal.my

  # ─── Job 2: Build Docker Images & Push to GHCR ───────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: build-and-test
    # Only build images on push to main or manual trigger (not on PRs)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write   # Required to push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          dockerfile: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=https://fyp.afiqhaiqal.my
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 3: Deploy to VPS ─────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync config files to VPS
        # Only sync infrastructure files — no source code needed on VPS anymore
        run: |
          rsync -az \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='target' \
            --exclude='.env' \
            --exclude='frontend/dist' \
            --exclude='frontend/src' \
            --exclude='frontend/public' \
            --exclude='backend/src' \
            --exclude='bkb_backup.*' \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/bkb/"

      - name: Write .env on VPS
        env:
          DATABASE_URL:      ${{ secrets.DATABASE_URL }}
          DB_USER:           ${{ secrets.DB_USER }}
          DB_PASSWORD:       ${{ secrets.DB_PASSWORD }}
          JWT_SECRET:        ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          MAIL_USERNAME:     ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD:     ${{ secrets.MAIL_PASSWORD }}
        run: |
          # Validate required secrets
          MISSING=""
          [ -z "$DB_USER" ]            && MISSING="$MISSING DB_USER"
          [ -z "$DB_PASSWORD" ]        && MISSING="$MISSING DB_PASSWORD"
          [ -z "$JWT_SECRET" ]         && MISSING="$MISSING JWT_SECRET"
          [ -z "$JWT_REFRESH_SECRET" ] && MISSING="$MISSING JWT_REFRESH_SECRET"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:$MISSING"
            exit 1
          fi

          touch /tmp/bkb.env
          chmod 600 /tmp/bkb.env

          printf 'DATABASE_URL=%s\n'         "${DATABASE_URL:-jdbc:postgresql://host.docker.internal:5432/bkb}" >> /tmp/bkb.env
          printf 'DB_USER=%s\n'              "$DB_USER"              >> /tmp/bkb.env
          printf 'DB_PASSWORD=%s\n'          "$DB_PASSWORD"          >> /tmp/bkb.env
          printf 'JWT_SECRET=%s\n'           "$JWT_SECRET"           >> /tmp/bkb.env
          printf 'JWT_REFRESH_SECRET=%s\n'   "$JWT_REFRESH_SECRET"   >> /tmp/bkb.env
          printf 'FRONTEND_URL=%s\n'         "https://fyp.afiqhaiqal.my" >> /tmp/bkb.env
          printf 'CORS_ALLOWED_ORIGINS=%s\n' "https://fyp.afiqhaiqal.my" >> /tmp/bkb.env
          printf 'VITE_API_BASE_URL=%s\n'    "https://fyp.afiqhaiqal.my" >> /tmp/bkb.env
          printf 'MAIL_USERNAME=%s\n'        "${MAIL_USERNAME:-noreply@example.com}" >> /tmp/bkb.env
          printf 'MAIL_PASSWORD=%s\n'        "${MAIL_PASSWORD:-placeholder}"         >> /tmp/bkb.env
          printf 'SPRING_PROFILES_ACTIVE=%s\n' "prod"                >> /tmp/bkb.env
          printf 'BACKEND_IMAGE=%s\n'        "${{ env.BACKEND_IMAGE }}:${{ github.sha }}" >> /tmp/bkb.env
          printf 'FRONTEND_IMAGE=%s\n'       "${{ env.FRONTEND_IMAGE }}:${{ github.sha }}" >> /tmp/bkb.env

          scp /tmp/bkb.env "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/bkb/.env"
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "chmod 600 ~/bkb/.env"
          rm -f /tmp/bkb.env

      - name: Setup PostgreSQL on VPS
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "bash ~/bkb/scripts/setup-postgres.sh"

      - name: Deploy on VPS
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << 'ENDSSH'
            set -e
            cd ~/bkb

            echo "=== Pre-flight: Check PostgreSQL ==="
            if ! pg_isready -h 127.0.0.1 -p 5432; then
              echo "::error::PostgreSQL is NOT running on localhost:5432"
              sudo systemctl status postgresql || true
              exit 1
            fi
            echo "PostgreSQL OK."

            echo "=== Logging in to GitHub Container Registry ==="
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            echo "=== Pulling latest images from GHCR ==="
            docker compose -f docker-compose.prod.yml pull

            echo "=== Starting containers ==="
            docker compose -f docker-compose.prod.yml up -d

            echo "=== Waiting for backend to be healthy (up to 3 min) ==="
            HEALTHY=false
            for i in $(seq 1 36); do
              HEALTH=$(wget -qO- http://localhost:8081/actuator/health 2>/dev/null || echo '{}')
              if echo "$HEALTH" | grep -q '"status":"UP"'; then
                echo "Backend is healthy!"
                HEALTHY=true
                break
              fi
              echo "  Attempt $i/36 — waiting 5s... ($HEALTH)"
              sleep 5
            done

            if [ "$HEALTHY" = false ]; then
              echo "::error::Backend failed to become healthy after 3 minutes."
              docker compose -f docker-compose.prod.yml logs --tail=100 backend
              exit 1
            fi

            echo "=== Reloading nginx ==="
            sudo nginx -t && sudo systemctl reload nginx

            echo "=== Removing old/unused Docker images ==="
            docker image prune -f

            echo "=== Deployment complete! ==="
          ENDSSH
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER:  ${{ github.repository_owner }}

      - name: Deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Deployment to https://fyp.afiqhaiqal.my succeeded"
          else
            echo "❌ Deployment failed — check logs above"
          fi

# ─── Required GitHub Secrets ─────────────────────────────────────
# Set in: GitHub Repo → Settings → Secrets and variables → Actions
#
# VPS_SSH_PRIVATE_KEY   — Private SSH key for VPS access
# VPS_HOST              — VPS IP address or hostname
# VPS_USER              — SSH username
# GHCR_TOKEN            — GitHub PAT with read:packages scope (for VPS to pull images)
# DATABASE_URL          — jdbc:postgresql://host.docker.internal:5432/bkb
# DB_USER               — PostgreSQL username
# DB_PASSWORD           — Strong database password
# JWT_SECRET            — Run: openssl rand -hex 64
# JWT_REFRESH_SECRET    — Run: openssl rand -hex 64 (different value)
# MAIL_USERNAME         — Gmail address
# MAIL_PASSWORD         — Gmail App Password (16 chars, no spaces)
