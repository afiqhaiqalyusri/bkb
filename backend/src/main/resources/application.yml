spring:
  application:
    name: bkb-backend

  datasource:
    # host.docker.internal resolves to the host machine from inside Docker
    # (requires extra_hosts: host.docker.internal:host-gateway in docker-compose)
    url: ${DATABASE_URL:jdbc:postgresql://host.docker.internal:5432/bkb}
    username: ${DB_USER:bkb_user}
    password: ${DB_PASSWORD:changeme}  # Set DB_PASSWORD secret in GitHub repo settings
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Kuala_Lumpur

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:${SPRING_MAIL_USERNAME:noreply@example.com}}
    password: ${MAIL_PASSWORD:${SPRING_MAIL_PASSWORD:placeholder}}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com
          connectiontimeout: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_CONNECTIONTIMEOUT:5000}
          timeout: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_TIMEOUT:5000}
          writetimeout: 5000

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=10000,expireAfterWrite=60s

server:
  port: 8081
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

management:
  endpoints:
    web:
      exposure:
        include: health  # Production: health only — never expose metrics/info publicly
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    mail:
      enabled: false  # Don't fail health check if mail is misconfigured

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}          # REQUIRED — generate: openssl rand -hex 64
  refresh-secret: ${JWT_REFRESH_SECRET}  # REQUIRED — generate: openssl rand -hex 64
  access-token-expiry-ms: 900000        # 15 minutes
  refresh-token-expiry-ms: 604800000    # 7 days

# CORS
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Business rules
bkb:
  loyalty:
    points-per-rm: 1        # 1 point per RM10 (so per RM = 0.1, rounded)
    rm-per-point: 10
  tax:
    rate: 0.06              # 6% SST

# Logging
logging:
  level:
    com.bkb: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

# SpringDoc / Swagger UI
# Disabled in production (prod profile sets springdoc.api-docs.enabled=false)
springdoc:
  swagger-ui:
    config-url: /api/v3/api-docs/swagger-config
    url: /api/v3/api-docs
    enabled: true
  api-docs:
    path: /v3/api-docs
    enabled: true



# Application security settings
app:
  mail:
    from: ${MAIL_USERNAME:${SPRING_MAIL_USERNAME:noreply@example.com}}
    from-name: BKB System
  security:
    otp-expiry-minutes: 10
    otp-max-attempts: 3
    password-reset-expiry-minutes: 15
    password-reset-max-per-hour: 3
    account-lockout-attempts: 5
    account-lockout-minutes: 15
