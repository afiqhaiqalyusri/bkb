version: "3.9"

# ─────────────────────────────────────────────────────────────────
#  BKB — Local Development Docker Compose
#  Includes PostgreSQL as a container (no host DB needed).
#
#  Start:   docker compose up -d
#  Stop:    docker compose down
#  Reset:   docker compose down -v  (WARNING: deletes local DB data)
# ─────────────────────────────────────────────────────────────────

services:

  db:
    image: postgres:17-alpine
    container_name: bkb_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       bkb
      POSTGRES_USER:     ${DB_USER:-bkb_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bkb_password}
    volumes:
      - pg_data:/var/lib/postgresql/data
    # Port NOT exposed to host — only accessible within the Docker network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bkb_user} -d bkb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bkb_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL:        jdbc:postgresql://db:5432/bkb
      DB_USER:             ${DB_USER:-bkb_user}
      DB_PASSWORD:         ${DB_PASSWORD:-bkb_password}
      JWT_SECRET:          ${JWT_SECRET:-dev_jwt_secret_change_in_prod}
      JWT_REFRESH_SECRET:  ${JWT_REFRESH_SECRET:-dev_refresh_secret_change_in_prod}
      FRONTEND_URL:        ${FRONTEND_URL:-http://localhost:5173}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME:-noreply@example.com}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD:-placeholder}
      MANAGEMENT_HEALTH_MAIL_ENABLED: "false"
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health 2>/dev/null | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8081}
    container_name: bkb_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  pg_data:
